name: Deploy to Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.XSERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 10022 ${{ secrets.XSERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create remote directory
        run: |
          ssh -p 10022 -i ~/.ssh/id_rsa \
            ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }} \
            "mkdir -p ${{ secrets.STAGING_REMOTE_PATH }}"

      - name: Deploy via rsync
        run: |
          rsync -avzr --delete \
            -e "ssh -p 10022 -i ~/.ssh/id_rsa" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.vscode/' \
            --exclude='node_modules/' \
            --exclude='src/js/' \
            --exclude='src/css/' \
            --exclude='index.html' \
            --exclude='vite.config*.js' \
            --exclude='package*.json' \
            --exclude='tailwind.config.js' \
            --exclude='*.local' \
            ./ \
            ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.STAGING_REMOTE_PATH }}/
